<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>لوحة التحكم – وِعْر</title>
  <link href="https://fonts.googleapis.com/css2?family=Tajawal:wght@300;400;500;700;800;900&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="../assets/css/main.css">
  <style>
    body { padding: 40px; }
    .dash-header { display: flex; justify-content: space-between; align-items: center; margin-bottom: 40px; }
    .dash-header h1 { font-size: 28px; font-weight: 900; }
    .dash-header a { color: var(--clay); text-decoration: none; font-weight: 600; }
    .dash-grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(250px, 1fr)); gap: 20px; }
    .dash-card { background: var(--slate); border-radius: 14px; padding: 28px; border: 1px solid rgba(255,255,255,0.06); }
    .dash-card h3 { font-size: 14px; color: var(--mist); margin-bottom: 8px; }
    .dash-card .num { font-size: 36px; font-weight: 900; color: var(--clay); }
    .placeholder-msg { text-align: center; padding: 80px 20px; color: var(--mist); }
    .placeholder-msg h2 { font-size: 24px; margin-bottom: 12px; color: var(--cream); }
  </style>
</head>
<body>
  <div class="dash-header">
    <h1>لوحة تحكم المنظم 🏔</h1>
    <a href="../index.html">→ العودة للرئيسية</a>
  </div>

  <div class="dash-grid">
    <div class="dash-card"><h3>رحلاتي المنشورة</h3><div class="num">0</div></div>
    <div class="dash-card"><h3>حجوزات هذا الشهر</h3><div class="num">0</div></div>
    <div class="dash-card"><h3>إجمالي الأرباح</h3><div class="num">0 ر.س</div></div>
    <div class="dash-card"><h3>متوسط التقييم</h3><div class="num">—</div></div>
  </div>

  <div class="placeholder-msg">
    <h2>🚧 هذه اللوحة قيد التطوير</h2>
    <p>هنا راح تقدر تضيف رحلات جديدة، تتابع الحجوزات، وتشوف الإحصائيات.</p>
  </div>

  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
  <script src="../assets/js/supabase.js"></script>
  <script>
    /* تحقق من صلاحية المستخدم */
    sb.auth.onAuthStateChange(function(event, session) {
      if (!session) {
        window.location.href = '../index.html';
      }
    });
  </script>
</body>
</html>
